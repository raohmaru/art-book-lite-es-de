# 16:9 aspect ratio based on 1280 x 720
# @width: 1280
# @height: 720
theme:
  view:
    - $name: system,gamelist
      clock:
        $name: clock
        pos: 35 35
        fontSize: ${clockFontSize}
        backgroundHorizontalPadding: 11 6
        backgroundVerticalPadding: 21 12
      systemstatus:
        $name: system-status
        pos: 1250 45
        height: ${systemStatusHeight}
        backgroundHorizontalPadding: 11 6
        backgroundVerticalPadding: 13 8
        entries: all
    - $name: system
      carousel:
        $name: system-carousel
        maxItemCount: 5.5
      image:
        $name: system-logo
        maxSize: 640 252
      text:
        $name: system-game-count
        fontSize: ${clockFontSize}
        lineSpacing: 1.75
  variant:
    - $name: |-
        gamelist-list-basic,
        gamelist-list-metadata-miximage,
        gamelist-list-metadata-cover,
        gamelist-list-metadata-screenshot,
        gamelist-list-metadata-screenshot-marquee,
        gamelist-list-metadata-screenshot-cover,
        gamelist-list-cover,
        gamelist-list-screenshot-marquee
      view:
        - $name: system,gamelist
          helpsystem:
            $name: help-system-view,help-gamelist-view
            fontSize: ${helpsystemFontSize}
            backgroundHorizontalPadding: 15 8
            backgroundVerticalPadding: 19 10
            entrySpacing: 18
            iconTextSpacing: 8
        - $name: system
          helpsystem:
            - $name: help-system-view
              origin: 0.5 0.5
              pos: 640 675
              entries: ${helpSystemViewEntries}
            - $name: help-gamelist-view
              scope: none
        - $name: gamelist
          helpsystem:
            - $name: help-system-view
              scope: none
            - $name: help-gamelist-view
              origin: 0 1
              pos: 53 675
              entries: ${helpGamelistViewEntries}
    - $name: gamelist-list-basic
      view:
        $name: gamelist
        helpsystem:
          $name: help-gamelist-view
          origin: 0.5 0.5
          pos: 640 675
    - $name: |-
        gamelist-list-basic-nh,
        gamelist-list-metadata-miximage-nh,
        gamelist-list-metadata-cover-nh,
        gamelist-list-metadata-screenshot-nh,
        gamelist-list-metadata-screenshot-marquee-nh,
        gamelist-list-metadata-screenshot-cover-nh,
        gamelist-list-cover-nh,
        gamelist-list-screenshot-marquee-nh,
        gamelist-grid-cover-nh,
        gamelist-grid-cover-steamgriddb-nh,
        gamelist-grid-screenshot-nh
      view:
        $name: system,gamelist
        helpsystem:
          $name: help-system-view,help-gamelist-view
          origin: 0 0
          pos: 1280 720
    - $name: |-
        gamelist-grid-cover,
        gamelist-grid-cover-steamgriddb,
        gamelist-grid-screenshot
      view:
        - $name: system,gamelist
          helpsystem:
            $name: help-system-view,help-gamelist-view
            fontSize: ${helpsystemFontSize}
            backgroundHorizontalPadding: 15 8
            backgroundVerticalPadding: 19 10
            entrySpacing: 18
            iconTextSpacing: 8
        - $name: system
          helpsystem:
            - $name: help-system-view
              origin: 0.5 0.5
              pos: 640 675
              entries: ${helpSystemViewEntries}
            - $name: help-gamelist-view
              scope: none
        - $name: gamelist
          helpsystem:
            - $name: help-system-view
              scope: none
            - $name: help-gamelist-view
              origin: 0.5 0.5
              pos: 640 675
              entries: ${helpSystemViewEntries}
    - $name: |-
        gamelist-list-basic,
        gamelist-list-basic-nh,
        gamelist-list-metadata-miximage,
        gamelist-list-metadata-miximage-nh,
        gamelist-list-metadata-cover,
        gamelist-list-metadata-cover-nh,
        gamelist-list-metadata-screenshot,
        gamelist-list-metadata-screenshot-nh,
        gamelist-list-metadata-screenshot-marquee,
        gamelist-list-metadata-screenshot-marquee-nh,
        gamelist-list-metadata-screenshot-cover,
        gamelist-list-metadata-screenshot-cover-nh,
        gamelist-list-cover,
        gamelist-list-cover-nh,
        gamelist-list-screenshot-marquee,
        gamelist-list-screenshot-marquee-nh
      view:
        $name: gamelist
        image:
          - $name: gamelist-background
            size: 1280 720
            path: ./_assets/images/gamelist-background.svg
          - $name: logo
            maxSize: 345 75
        text:
          $name: custom-collection-name
          pos: 640 94
        textlist:
