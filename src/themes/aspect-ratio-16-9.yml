        gamelist-list-metadata-screenshot-marquee,
        gamelist-list-metadata-screenshot-cover,
        gamelist-list-cover,
        gamelist-list-screenshot-marquee
      view:
        $name: gamelist
        textlist:
          $name: gamelist-list
          lineSpacing: ${gamelistLineSpacing}
      fontSize:
        - $name: small,x-small
          variables:
            gamelistLineSpacing: 1.94444444
        - $name: medium
          variables:
            gamelistLineSpacing: 1.94444444
        - $name: large
          variables:
            gamelistLineSpacing: 1.98051948
        - $name: x-large
          variables:
